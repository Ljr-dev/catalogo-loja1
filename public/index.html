<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h2>Catálogo Online</h2>
  <p>Faça seu pedido pelo WhatsApp</p>
</header>

<div class="top-area">
  <input id="nome" placeholder="👤 Seu nome" />
  <input id="busca" placeholder="🔍 Buscar produtos..." oninput="aplicarFiltros()" />
</div>

<div id="categorias"></div>

<div id="produtos"></div>

<div id="carrinho-box">
  <h3>🛒 Seu Carrinho</h3>
  <div id="carrinho-itens"></div>
</div>

<div id="bottom-bar">
  <span id="resumo">0 itens | R$ 0,00</span>
  <button id="btnEnviar" onclick="enviar()" style="display:none;">
    Enviar orçamento
  </button>
</div>

<script src="script.js"></script>
</body>
</html>
